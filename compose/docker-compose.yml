name: ${PROJECT_NAME:-homeserver}

services:

  mariadb:
    image: mariadb:11.8
    container_name: mariadb
    restart: unless-stopped

    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-portfolio_api}
      MARIADB_USER: ${MYSQL_USER:-portfolio}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in compose/.env}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in compose/.env}

    volumes:
      - mariadb_data:/var/lib/mysql

    networks:
      - home-network

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped

    volumes:
      - redis_data:/data

    networks:
      - home-network

  fastapi:
    build:
      context: ../apps/ai-service

    container_name: fastapi

    restart: unless-stopped

    networks:
      - home-network

  react:
    build:
      context: ../apps/portfolio-web

    container_name: react

    restart: unless-stopped

    networks:
      - home-network

  laravel:
    build:
      context: ../apps/portfolio-api

    container_name: laravel

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ../apps/portfolio-api:/var/www

    depends_on:
      - mariadb

    networks:
      - home-network

  nginx:
    image: nginx:alpine
    container_name: nginx

    restart: unless-stopped

    ports:
      - "${NGINX_PORT:-80}:80"

    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../apps/portfolio-api:/var/www:ro
    depends_on:
      - fastapi

    networks:
      - home-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer

    restart: unless-stopped

    ports:
      - "${PORTAINER_PORT:-9000}:9000"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    networks:
      - home-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter

    restart: unless-stopped

    pid: host

    command:
      - "--path.rootfs=/host"

    volumes:
      - /:/host:ro,rslave

    networks:
      - home-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    restart: unless-stopped

    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - home-network

    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana

    restart: unless-stopped

    ports:
      - "${GRAFANA_PORT:-3000}:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - home-network

    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor

    restart: unless-stopped

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

    networks:
      - home-network

  uptime-kuma:
    image: louislam/uptime-kuma:1

    container_name: uptime-kuma

    restart: unless-stopped

    ports:
      - "${UPTIME_KUMA_PORT:-3002}:3001"

    volumes:
      - uptime_kuma_data:/app/data

    networks:
      - home-network

networks:
  home-network:

volumes:
  mariadb_data:
  redis_data:
  portainer_data:
  grafana_data:
  uptime_kuma_data:
