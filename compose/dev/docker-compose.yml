services:

  mariadb:
    image: mariadb:11.8
    container_name: mariadb
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: portfolio_api
      MARIADB_USER: portfolio
      MARIADB_PASSWORD: Aa##1234

    ports:
      - "3307:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

    networks:
      - home-network

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - home-network

  fastapi:
    build:
      context: /srv/apps/ai-service

    container_name: fastapi

    restart: unless-stopped

    ports:
      - "8001:8000"

    networks:
      - home-network

  laravel:
    build:
      context: /srv/apps/portfolio-api

    container_name: laravel

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - /srv/apps/portfolio-api:/var/www

    networks:
      - home-network

    depends_on:
      - mariadb

  nginx:
    image: nginx:alpine
    container_name: nginx

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - fastapi

    networks:
      - home-network

networks:
  home-network:


volumes:
  mariadb_data:
  redis_data:
